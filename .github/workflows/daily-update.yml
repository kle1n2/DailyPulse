name: Daily Data Update

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build daily JSON
        run: npm run fetch:daily

      - name: Validate generated data and site
        run: npm run check

      - name: Publish quality summary
        run: |
          echo "## DailyPulse Quality Summary" >> "$GITHUB_STEP_SUMMARY"
          node -e "const fs=require('fs');const index=JSON.parse(fs.readFileSync('data/index.json','utf8'));const latest=index.dates?.[0];if(!latest){throw new Error('No latest index entry.')}fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, '- Date: '+latest.date+'\n- Coverage: '+(latest.coverage_status ?? 'unknown')+'\n- News: '+latest.news_total+'\n- Papers: '+latest.paper_total+'\n- Source failures: '+(latest.source_failure_count ?? 0)+'\n');if((latest.coverage_status ?? 'unknown')==='low'){process.exit(1);}" 

      - name: Commit and push updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [[ -n "$(git status --porcelain data)" ]]; then
            git add data
            git commit -m "chore(data): daily update"
            git push
          else
            echo "No data changes."
          fi
