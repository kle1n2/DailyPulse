name: Daily Data Update

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      REPO_NAME: ${{ github.event.repository.name }}
      OWNER: ${{ github.repository_owner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build daily JSON
        run: npm run fetch:daily

      - name: Validate generated data and site
        run: npm run check

      - name: Publish quality summary
        run: |
          echo "## DailyPulse Quality Summary" >> "$GITHUB_STEP_SUMMARY"
          node -e "const fs=require('fs');const index=JSON.parse(fs.readFileSync('data/index.json','utf8'));const latest=index.dates?.[0];if(!latest){throw new Error('No latest index entry.')}fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, '- Date: '+latest.date+'\n- Coverage: '+(latest.coverage_status ?? 'unknown')+'\n- News: '+latest.news_total+'\n- Papers: '+latest.paper_total+'\n- Source failures: '+(latest.source_failure_count ?? 0)+'\n');if((latest.coverage_status ?? 'unknown')==='low'){process.exit(1);}" 

      - name: Commit and push updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [[ -n "$(git status --porcelain data)" ]]; then
            git add data
            git commit -m "chore(data): daily update"
            git push
          else
            echo "No data changes."
          fi

      - name: Resolve base path
        id: site
        run: |
          if [[ "$REPO_NAME" == "${OWNER}.github.io" ]]; then
            echo "base_path=/" >> "$GITHUB_OUTPUT"
            echo "site_url=https://${OWNER}.github.io" >> "$GITHUB_OUTPUT"
          else
            echo "base_path=/${REPO_NAME}/" >> "$GITHUB_OUTPUT"
            echo "site_url=https://${OWNER}.github.io/${REPO_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build Astro
        env:
          BASE_PATH: ${{ steps.site.outputs.base_path }}
          SITE_URL: ${{ steps.site.outputs.site_url }}
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    needs: update
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4